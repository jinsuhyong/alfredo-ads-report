<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alfredo — Meta Ads Report | May 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --forest:#1e4620;--forest-md:#2c5f2e;--forest-lt:#4a8a4c;
  --cream:#f8f3eb;--cream-dk:#f0e9dc;--divider:#dfd7c9;
  --gold:#c49a2e;--gold-lt:#f5ecd4;
  --terra:#b5451b;
  --charcoal:#1a1a18;--ink:#2d2d2a;--muted:#7a7264;--subtle:#a09488;
  --up:#1e6e35;--up-bg:#e8f5ec;--down:#b5451b;--down-bg:#fbede8;
  --neutral:#5a6474;--neutral-bg:#eef0f4;
  --surface:#fff;--surface2:#f0e9dc;
  --shadow-sm:0 1px 3px rgba(30,70,32,.07),0 1px 2px rgba(30,70,32,.05);
  --shadow-md:0 4px 16px rgba(30,70,32,.10),0 2px 6px rgba(30,70,32,.06);
  --radius:10px;--radius-sm:6px;--tr:180ms cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream);color:var(--ink);font-family:'DM Sans','Sarabun',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
.lang-th body,.lang-th{font-family:'Sarabun','DM Sans',sans-serif}
.nav{position:sticky;top:0;z-index:200;background:var(--forest);height:54px;display:flex;align-items:center;padding:0 20px;box-shadow:0 2px 12px rgba(0,0,0,.25);gap:0}
.nav-brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:#fff;letter-spacing:.04em;margin-right:20px;flex-shrink:0}
.nav-brand em{color:#b8d4a0;font-style:italic;font-weight:400}
.nav-tabs{display:flex;gap:2px;overflow-x:auto;flex:1}
.nav-tabs::-webkit-scrollbar{height:0}
.nav-tab{padding:5px 13px;border-radius:var(--radius-sm);border:none;background:transparent;color:rgba(255,255,255,.58);font-family:'DM Sans','Sarabun',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all var(--tr)}
.nav-tab:hover{color:#fff;background:rgba(255,255,255,.1)}
.nav-tab.active{background:rgba(255,255,255,.18);color:#fff;border-bottom:2px solid #b8d4a0}

/* LANGUAGE TOGGLE */
.lang-toggle{display:flex;align-items:center;gap:3px;margin-left:12px;flex-shrink:0;background:rgba(255,255,255,.1);border-radius:20px;padding:3px}
.lang-btn{padding:3px 10px;border-radius:16px;border:none;background:transparent;color:rgba(255,255,255,.65);font-family:'DM Sans','Sarabun',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all var(--tr);letter-spacing:.02em}
.lang-btn:hover{color:#fff}
.lang-btn.active{background:#fff;color:var(--forest);box-shadow:0 1px 4px rgba(0,0,0,.15)}

.period-bar{background:var(--surface);border-bottom:1px solid var(--divider);padding:9px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.period-label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.period-btn{padding:4px 14px;border-radius:20px;border:1.5px solid var(--divider);background:transparent;color:var(--muted);font-family:'DM Sans','Sarabun',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all var(--tr)}
.period-btn:hover{border-color:var(--forest-md);color:var(--forest-md)}
.period-btn.active{background:var(--forest);color:#fff;border-color:var(--forest)}
.period-compare{margin-left:auto;font-size:12px;color:var(--muted)}
.period-compare strong{color:var(--forest-md)}
.data-badge{display:inline-flex;align-items:center;gap:6px;background:var(--up-bg);color:var(--up);font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px}
.page{display:none;padding:20px;max-width:1280px;margin:0 auto}
.page.active{display:block}
.section-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:var(--charcoal);margin-bottom:3px}
.section-sub{font-size:12.5px;color:var(--muted);margin-bottom:20px}
.grid-8{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
@media(max-width:900px){.grid-8{grid-template-columns:repeat(2,1fr)}}
@media(max-width:680px){.grid-8,.grid-2,.grid-3{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--divider);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:14px}
.card-head{padding:13px 18px;border-bottom:1px solid var(--divider);display:flex;align-items:center;gap:8px}
.card-title{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:700;color:var(--charcoal)}
.card-body{padding:18px}
.stat-card{background:var(--surface);border:1px solid var(--divider);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow-sm);transition:all var(--tr);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--forest-md);transform:scaleX(0);transform-origin:left;transition:transform var(--tr)}
.stat-card:hover::before{transform:scaleX(1)}
.stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-weight:700;margin-bottom:8px}
.stat-value{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--charcoal);line-height:1;margin-bottom:8px}
.stat-badge{display:inline-flex;align-items:center;gap:3px;font-size:11.5px;font-weight:700;padding:2px 8px;border-radius:99px}
.stat-badge.up{background:var(--up-bg);color:var(--up)}
.stat-badge.down{background:var(--down-bg);color:var(--down)}
.stat-prev{font-size:11px;color:var(--subtle);margin-top:4px}
.period-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:580px){.period-grid{grid-template-columns:1fr}}
.period-block{background:var(--surface);border:1px solid var(--divider);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm)}
.period-block.curr{border-color:var(--forest-md);border-width:2px}
.period-block-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:3px}
.period-block-date{font-size:12px;color:var(--forest-md);font-weight:700;margin-bottom:12px}
.mrow{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--divider)}
.mrow:last-child{border-bottom:none}
.mrow-lbl{color:var(--muted)}.mrow-val{font-weight:700}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{padding:9px 14px;text-align:left;background:var(--surface2);color:var(--muted);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--divider);white-space:nowrap}
tbody td{padding:10px 14px;border-bottom:1px solid var(--cream-dk);white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--cream-dk)}
.pill{display:inline-block;padding:2px 9px;border-radius:99px;font-size:10.5px;font-weight:700}
.pill-awareness{background:var(--cream-dk);color:var(--forest-md);border:1px solid #c0d4c0}
.pill-engagement{background:var(--gold-lt);color:#7a5c10;border:1px solid #dbc88a}
.creative-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:680px){.creative-grid{grid-template-columns:1fr}}
.creative-card{background:var(--surface);border:1px solid var(--divider);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);transition:all var(--tr)}
.creative-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.creative-card.best{border-color:#8ac49a}
.creative-card.worst{border-color:#e0a08a}
.creative-preview{width:100%;height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.g-best{background:linear-gradient(140deg,#e8f2e8,#f2f8e8)}
.g-best2{background:linear-gradient(140deg,#e8f0f8,#eef4f8)}
.g-worst{background:linear-gradient(140deg,#fdf0e8,#faf4f0)}
.g-worst2{background:linear-gradient(140deg,#fdf5e8,#faf0e8)}
.preview-name{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:700;color:var(--charcoal)}
.preview-sub{font-size:11px;color:var(--muted);text-align:center;padding:0 16px}
.preview-link{font-size:11.5px;color:var(--forest-md);text-decoration:none;font-weight:700;display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border:1.5px solid var(--forest-md);border-radius:99px;transition:all var(--tr);margin-top:4px}
.preview-link:hover{background:var(--forest-md);color:#fff}
.preview-link.red{border-color:var(--terra);color:var(--terra)}
.preview-link.red:hover{background:var(--terra);color:#fff}
.creative-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;margin-bottom:10px}
.badge-best{background:var(--up-bg);color:var(--up)}
.badge-worst{background:var(--down-bg);color:var(--down)}
.creative-body{padding:16px}
.creative-name-text{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:700;color:var(--charcoal);margin-bottom:3px}
.creative-id{font-size:10px;color:var(--muted);font-family:monospace;background:var(--surface2);padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:10px}
.cm{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-bottom:1px solid var(--cream-dk)}
.cm:last-child{border-bottom:none}
.cm-lbl{color:var(--muted)}.cm-val{font-weight:700}
.val-g{color:var(--up)}.val-b{color:var(--down)}
.verdict-card{border-radius:var(--radius);padding:14px 16px;display:flex;gap:12px;align-items:flex-start;margin-bottom:8px;border:1px solid}
.verdict-card.win{background:var(--up-bg);border-color:#8ac49a}
.verdict-card.loss{background:var(--down-bg);border-color:#e0a08a}
.verdict-card.ok{background:var(--neutral-bg);border-color:#c0c8d4}
.verdict-text{font-size:13px;line-height:1.7}
.verdict-text strong{color:var(--charcoal)}
.bm-card{background:var(--surface);border:1px solid var(--divider);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm)}
.bm-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-weight:700;margin-bottom:14px}
.bm-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--cream-dk)}
.bm-row:last-child{border-bottom:none}
.bm-lbl{font-size:12px;color:var(--muted);flex:1}
.bm-val{font-size:13px;font-weight:700;min-width:64px;text-align:right}
.bm-bar{flex:2}.bm-bg{height:5px;background:var(--cream-dk);border-radius:99px;overflow:hidden}
.bm-fill{height:100%;border-radius:99px}
.f-green{background:var(--forest-md)}.f-gold{background:var(--gold)}.f-up{background:var(--up)}.f-down{background:var(--terra)}.f-neutral{background:#b0c8b0}
.insight-card{background:var(--surface);border:1px solid var(--divider);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm);display:flex;gap:12px}
.insight-icon{width:36px;height:36px;border-radius:8px;background:var(--cream-dk);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;color:var(--forest-md)}
.insight-h4{font-size:13px;font-weight:700;color:var(--charcoal);margin-bottom:5px}
.insight-p{font-size:12.5px;color:var(--muted);line-height:1.7}
.insight-p strong{color:var(--charcoal)}
.step-item{background:var(--surface);border:1px solid var(--divider);border-radius:var(--radius);padding:15px 18px;display:flex;gap:14px;box-shadow:var(--shadow-sm);transition:all var(--tr);margin-bottom:10px}
.step-item:hover{box-shadow:var(--shadow-md);border-color:var(--forest-lt);transform:translateX(2px)}
.step-num{min-width:28px;height:28px;border-radius:50%;background:var(--forest);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-txt{font-size:13px;line-height:1.7}
.step-txt strong{color:var(--forest-md)}
.bar-wrap{display:flex;align-items:center;gap:8px}
.bar-bg{flex:1;height:5px;background:var(--cream-dk);border-radius:99px;overflow:hidden;min-width:50px}
.bar-fill{height:100%;border-radius:99px;background:var(--forest-md)}
.notice{background:var(--gold-lt);border:1px solid #dbc88a;border-radius:var(--radius);padding:12px 16px;font-size:12.5px;color:#6a4e10;margin-bottom:14px;display:flex;gap:10px}
.notice a{color:var(--forest-md);font-weight:700}
.footnote{font-size:11px;color:var(--subtle);margin-top:8px;line-height:1.6}
.footnote a{color:var(--forest-md)}
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-brand">Alfredo <em>Ads Report</em></span>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('overview',this)" data-en="Overview" data-th="ภาพรวม">Overview</button>
    <button class="nav-tab" onclick="showPage('platform',this)" data-en="Platform" data-th="แพลตฟอร์ม">Platform</button>
    <button class="nav-tab" onclick="showPage('svcpm',this)" data-en="Spend vs CPM" data-th="ค่าใช้จ่าย vs CPM">Spend vs CPM</button>
    <button class="nav-tab" onclick="showPage('campaigns',this)" data-en="Campaigns" data-th="แคมเปญ">Campaigns</button>
    <button class="nav-tab" onclick="showPage('placements',this)" data-en="Placements" data-th="ตำแหน่งโฆษณา">Placements</button>
    <button class="nav-tab" onclick="showPage('creatives',this)" data-en="Creatives" data-th="ครีเอทีฟ">Creatives</button>

    <button class="nav-tab" onclick="showPage('insights',this)" data-en="Insights" data-th="ข้อมูลเชิงลึก">Insights</button>
    <button class="nav-tab" onclick="showPage('nextsteps',this)" data-en="Next Steps" data-th="ขั้นตอนต่อไป">Next Steps</button>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en',this)">EN</button>
    <button class="lang-btn" onclick="setLang('th',this)">TH</button>
  </div>
</nav>

<div class="period-bar">
  <span class="period-label" data-en="Period" data-th="ช่วงเวลา">Period</span>
  <button class="period-btn active" onclick="switchPeriod('current',this)" data-en="May 2026 (Apr 26–May 25)" data-th="พ.ค. 2569 (26 เม.ย.–25 พ.ค.)">May 2026 (Apr 26–May 25)</button>
  <button class="period-btn" onclick="switchPeriod('previous',this)" data-en="Apr 2026 (Mar 26–Apr 25)" data-th="เม.ย. 2569 (26 มี.ค.–25 เม.ย.)">Apr 2026 (Mar 26–Apr 25)</button>
  <div class="period-compare" data-en-prefix="Comparing vs" data-th-prefix="เปรียบเทียบกับ">Comparing vs <strong id="compareLabel">Mar 26–Apr 25, 2026</strong></div>
  <span class="data-badge" data-en="Live data — May 28, 2026" data-th="ข้อมูลจริง — 28 พ.ค. 2569">&#10003; Live data — May 28, 2026</span>
</div>

  <div class="section-title" id="t-overview-title"></div>
  <div class="section-sub" id="overviewSub"></div>
  <div class="grid-8" id="statGrid"></div>
  <div class="period-grid" id="periodRow"></div>
  <div class="card"><div class="card-head"><span class="card-title" id="t-period-comparison"></span></div><div class="card-body"><canvas id="overviewChart" height="85"></canvas></div></div>

<div id="page-platform" class="page">
  <div class="section-title" id="t-platform-title"></div>

    <div class="card"><div class="card-head"><span class="card-title" id="t-spend-by-platform"></span></div><div class="card-body"><canvas id="platformPie" height="230"></canvas></div></div>
    <div class="card"><div class="card-head"><span class="card-title" id="t-imp-by-platform"></span></div><div class="card-body"><canvas id="impressionPie" height="230"></canvas></div></div>
  </div>
  <div class="card"><div class="card-head"><span class="card-title" id="t-platform-cpm"></span></div><div class="card-body"><canvas id="platformBar" height="100"></canvas></div></div>
</div>

  <div class="section-title" id="t-svcpm-title"></div>
  <div class="section-sub" id="t-svcpm-sub"></div>
  <div class="card"><div class="card-head"><span class="card-title" id="t-svcpm-chart1"></span></div><div class="card-body"><canvas id="spendCpmChart" height="120"></canvas></div></div>
  <div class="card"><div class="card-head"><span class="card-title" id="t-svcpm-chart2"></span></div><div class="card-body"><canvas id="effChart" height="90"></canvas></div></div>
</div>

<div id="page-campaigns" class="page">
  <div class="section-title" id="t-campaigns-title"></div>

    <div class="card-head"><span class="card-title" id="campTitle"></span></div>

      <thead><tr id="campThead"></tr></thead>
      <tbody id="tblCurr"></tbody>
    </table></div>
  </div>
  <div class="section-title" style="font-size:19px;margin-top:6px" id="t-prev-period"></div>

  <div class="card"><div class="tbl-wrap"><table>
    <thead><tr id="campThead2"></tr></thead>
    <tbody id="tblPrev"></tbody>
  </table></div></div>

<div id="page-placements" class="page">
  <div class="section-title" id="t-placements-title"></div>

  <div class="grid-2">
    <div class="card"><div class="card-head"><span class="card-title" id="t-spend-by-pl"></span></div><div class="card-body"><canvas id="placementPie" height="240"></canvas></div></div>
    <div class="card"><div class="card-head"><span class="card-title" id="t-ctr-by-pl"></span></div><div class="card-body"><canvas id="placementCTR" height="240"></canvas></div></div>
  </div>

    <div class="tbl-wrap"><table>
      <thead><tr id="plThead"></tr></thead>
      <tbody id="tblPlacements"></tbody>
    </table></div>
  </div>
</div>

<div id="page-creatives" class="page">
  <div class="section-title" id="t-creatives-title"></div>
  <div class="section-sub" id="t-creatives-sub"></div>

  <div class="creative-grid" id="creativeGrid"></div>
  <div class="card"><div class="card-head"><span class="card-title" id="t-creatives-chart"></span></div><div class="card-body"><canvas id="creativesChart" height="120"></canvas></div></div>

<div id="page-benchmark" class="page">
  <div class="section-title" id="t-benchmark-title"></div>
  <div class="section-sub" id="t-benchmark-sub"></div>

<div id="page-insights" class="page">
  <div class="section-title" id="t-insights-title"></div>

<div style="font-size:11px;color:var(--subtle);text-align:center;padding:20px 0 10px" id="t-footer"></div>

<script>
Chart.defaults.font.family="'DM Sans','Sarabun',sans-serif";
Chart.defaults.color='#7a7264';
Chart.defaults.borderColor='#dfd7c9';

  // Placement table headers

  renderStats(d, prev);

function renderStats(d,prev){

    {lbl:tx.stat_cpc,      curr:thb(c.cpc),                         chg:pct(c.cpc,p?.cpc),           prev:tx.stat_prev_prefix+' '+thb(p?.cpc||0),        bd:true},
    {lbl:tx.stat_ctr,      curr:pctStr(c.ctr),                      chg:pct(c.ctr,p?.ctr),           prev:tx.stat_prev_prefix+' '+pctStr(p?.ctr||0),     bd:false},

function renderInsights(d){

function renderNextSteps(d){
  const tx=t();
  const camps=d.campaigns||[];
  const best=[...camps].sort((a,b)=>+a.cpc-+b.cpc)[0];
  const worstCreative=d.worstCreatives?.[0];
  const cheapPl=(d.placements||[]).filter(p=>+p.spend>5).sort((a,b)=>+a.cpm-+b.cpm)[0];
  const bestCreative=d.bestCreatives?.[0];
  const awarSpend=camps.filter(c=>c.type==='awareness').reduce((s,c)=>s+(+c.spend||0),0);
  const engSpend=camps.filter(c=>c.type==='engagement').reduce((s,c)=>s+(+c.spend||0),0);
  const engRatio=(engSpend/(awarSpend+engSpend||1)*100).toFixed(0);
  const steps=tx.step_fn(best,worstCreative,cheapPl,bestCreative,engRatio);
  document.getElementById('stepsList').innerHTML=steps.map((s,i)=>`<div class="step-item"><div class="step-num">${i+1}</div><div class="step-txt"><strong>${s.t}</strong> ${s.b}</div></div>`).join('');
}

function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
}

function switchPeriod(period,btn){
  activePeriod=period;
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

// Period bar button IDs needed by renderAll
document.getElementById('btnCurr') || document.querySelectorAll('.period-btn')[0].id || (() => {
  const btns = document.querySelectorAll('.period-btn');
  if(btns[0]) btns[0].id = 'btnCurr';
  if(btns[1]) btns[1].id = 'btnPrev';
})();

renderAll();
</script>
</body>
</html>
